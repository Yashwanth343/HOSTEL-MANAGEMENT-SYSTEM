<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIMS | Rooms</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase_client.js"></script>
  
  <style>

    :root {
      --primary: #1D4ED8;
      --sidebar-bg: #0B192C;
      --sidebar-hover: #1E3A8A;
      --bg-color: #F8FAFC;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
      --white: #FFFFFF;
      --danger: #EF4444;
      --success: #10B981;
      --warning: #F59E0B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Layout */
    #root { display: flex; width: 100%; }
    
    /* Sidebar */
    .sidebar { width: 260px; background-color: var(--sidebar-bg); color: var(--white); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.3s; z-index: 100; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
    .sidebar-logo { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sidebar-logo i { font-size: 28px; }
    .sidebar-logo h2 { font-size: 18px; font-weight: 800; letter-spacing: 1px; line-height: 1.1; margin:0;}
    .sidebar-logo p { font-size: 9px; font-weight: 500; letter-spacing: 1px; color: #94A3B8; margin:0;}
    
    .sidebar-menu { flex: 1; padding: 20px 12px; }
    .menu-label { font-size: 10px; font-weight: 700; color: #475569; letter-spacing: 1.5px; padding: 0 16px; margin: 16px 0 8px; }
    .menu-item { padding: 11px 16px; margin-bottom: 2px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #CBD5E1; font-size: 13.5px; font-weight: 500; transition: 0.2s; text-decoration: none; }
    .menu-item:hover { background-color: rgba(255,255,255,0.07); color: var(--white); }
    .menu-item.active { background-color: var(--primary); color: var(--white); }
    .menu-item-left { display: flex; align-items: center; gap: 12px; }
    .menu-item-left i { width: 18px; text-align: center; font-size: 15px; }
    
    .sub-menu { display: none; flex-direction: column; padding-left: 46px; margin-bottom: 4px; }
    .sub-menu.open { display: flex; }
    .sub-menu a { color: #94A3B8; text-decoration: none; padding: 8px 12px; font-size: 13px; font-weight: 500; transition: 0.2s; border-radius: 6px; display: block; }
    .sub-menu a:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .sub-menu a.active { color: var(--white); background-color: rgba(29,78,216,0.5); }
    
    /* Main Content */
    .main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    
    /* Top Header */
    .top-header { height: 70px; background-color: var(--white); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 90; }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .hamburger { font-size: 20px; color: var(--text-muted); cursor: pointer; }
    .page-title { display: flex; flex-direction: column; gap: 4px;}
    .page-title h1 { font-size: 20px; font-weight: 700; color: var(--text-main); margin:0; line-height:1;}
    .breadcrumb { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    
    .header-right { display: flex; align-items: center; gap: 20px; }
    .date-picker-btn { border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-main); display: flex; align-items: center; gap: 8px; cursor: pointer; background: white; }
    .notification-btn { position: relative; cursor: pointer; color: var(--text-muted); font-size: 20px; }
    .notification-dot { position: absolute; top: -4px; right: -4px; background: var(--danger); color: white; font-size: 10px; font-weight: bold; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
    .user-profile { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #E2E8F0; }
    .user-info { display: flex; flex-direction: column; }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text-main); }
    .user-role { font-size: 11px; color: var(--text-muted); }
    
    
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 95; backdrop-filter: blur(2px); }
    
    @media (max-width: 900px) {
        .sidebar { position: fixed; left: -260px; z-index: 100; transition: left 0.3s; }
        .sidebar.open { left: 0; box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
        .sidebar-overlay.show { display: block; }
        
        .top-header { padding: 0 16px; }
        .header-right > div:first-child { display: none !important; } /* Hide date on mobile */
        .page-title h1 { font-size: 16px; }
        .breadcrumb { font-size: 10px; }
        
        .content-area { padding: 16px; }
        .grid-2, .grid-3, .grid-4, .form-grid, .info-grid, .charts-grid, .bottom-grid, .kpi-grid, .stat-grid, .metrics-grid, .reports-grid { grid-template-columns: 1fr !important; }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { white-space: nowrap; }
        
        .card-body, .panel-body, .card-content { overflow-x: auto; }
        .auth-container { flex-direction: column; }
    }

    /* Content Area */
    .content-area { padding: 24px; flex: 1; overflow-y: auto; }


  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: white; border-radius: 20px; width: 540px; max-width: 95vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.2); animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .modal-head { padding: 22px 28px; border-bottom: 1px solid #F1F5F9; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: white; z-index: 1; border-radius: 20px 20px 0 0; }
  .modal-head h3 { font-size: 17px; font-weight: 700; color: #0F172A; }
  .modal-head p  { font-size: 12px; color: #94A3B8; margin-top: 2px; }
  .modal-close { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #E2E8F0; background: #F8FAFC; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #64748B; }
  .modal-close:hover { background: #FEF2F2; color: #EF4444; }
  .modal-body { padding: 28px; }
  .modal-actions { display: flex; gap: 10px; padding: 16px 28px; border-top: 1px solid #F1F5F9; justify-content: flex-end; }
  .btn-modal-print { padding: 9px 20px; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 7px; }
  .btn-modal-edit  { padding: 9px 20px; background: #1D4ED8; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; gap: 7px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .detail-item label { display: block; font-size: 11px; font-weight: 700; color: #94A3B8; letter-spacing: 0.5px; margin-bottom: 4px; }
  .detail-item span  { font-size: 13px; font-weight: 600; color: #0F172A; }
  .detail-sep { grid-column: 1/-1; border: none; border-top: 1px solid #F1F5F9; margin: 4px 0; }
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1100; align-items: center; justify-content: center; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: white; border-radius: 16px; padding: 32px; width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .confirm-icon { width: 60px; height: 60px; border-radius: 50%; background: #FEF2F2; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 26px; color: #EF4444; }
  .confirm-box h3 { font-size: 18px; font-weight: 700; color: #0F172A; margin-bottom: 8px; }
  .confirm-box p  { font-size: 13px; color: #64748B; margin-bottom: 24px; }
  .confirm-btns { display: flex; gap: 12px; justify-content: center; }
  .btn-cancel-del  { padding: 10px 28px; border: 1px solid #E2E8F0; background: white; border-radius: 8px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; }
  .btn-confirm-del { padding: 10px 28px; border: none; background: #EF4444; border-radius: 8px; font-size: 13px; font-weight: 700; color: white; cursor: pointer; }
  .success-toast { display: none; position: fixed; top: 24px; right: 24px; background: #10B981; color: white; padding: 14px 22px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-weight: 600; font-size: 13px; z-index: 9999; align-items: center; gap: 10px; }
  .success-toast.show { display: flex; }
  @media print { .sidebar, .top-header, .table-actions, .action-btn, .pagination, .modal-actions, .btn-add-room, .stats-row { display: none !important; } .modal-overlay { position:static !important; background:none !important; display:block !important; } .modal-box { box-shadow:none !important; width:100% !important; } }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
  .stat-card-rm { background: white; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 16px; border: 1px solid #F1F5F9; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
  .stat-icon-rm { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .stat-info-rm .stat-title-rm { font-size: 13px; font-weight: 600; color: #0F172A; display:block; margin-bottom:4px; }
  .stat-info-rm .stat-value-rm { font-size: 24px; font-weight: 700; color: #0F172A; display:block; }
  .stat-info-rm .stat-sub-rm   { font-size: 11px; color: #64748B; }

  .table-section { background: white; border-radius: 12px; border: 1px solid #F1F5F9; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
  .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .table-header h3 { font-size: 16px; font-weight: 700; color: #0F172A; }
  .table-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .table-actions select, .table-actions input { padding: 8px 12px; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 13px; color: #475569; outline: none; }
  .btn-add-room { padding: 8px 16px; border: none; border-radius: 8px; background: #1D4ED8; font-size: 13px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; }

  table { width: 100%; border-collapse: collapse; text-align: left; }
  th { font-size: 12px; font-weight: 700; color: #0F172A; padding: 14px 12px; border-bottom: 2px solid #F1F5F9; white-space: nowrap; }
  td { font-size: 13px; font-weight: 500; color: #475569; padding: 12px; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }

  .status-occupied  { background: #FEE2E2; color: #EF4444; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display:inline-block; }
  .status-available { background: #D1FAE5; color: #10B981; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display:inline-block; }
  .capacity-bar { display: flex; align-items: center; gap: 8px; }
  .cap-bar-bg   { flex: 1; height: 6px; background: #E2E8F0; border-radius: 4px; overflow: hidden; max-width: 80px; }
  .cap-bar-fill { height: 100%; border-radius: 4px; }
  .action-btn { background: #F8FAFC; border: 1px solid #E2E8F0; color: #3B82F6; padding: 6px 9px; border-radius: 6px; cursor: pointer; margin-right: 4px; transition: 0.2s; }
  .action-btn:hover { background: #EFF6FF; }
  .action-btn.red   { color: #EF4444; } .action-btn.red:hover   { background: #FEF2F2; }
  .action-btn.green { color: #10B981; } .action-btn.green:hover { background: #ECFDF5; }
  .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid #F1F5F9; }
  .page-info { font-size: 13px; color: #64748B; }
  .page-numbers { display: flex; gap: 4px; }
  .page-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border: 1px solid #E2E8F0; border-radius: 6px; background: white; font-size: 13px; font-weight: 500; color: #475569; cursor: pointer; }
  .page-btn.active { background: #1D4ED8; color: white; border-color: #1D4ED8; }
  .facility-tag { display: inline-block; background: #EFF6FF; color: #1D4ED8; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; margin: 2px; }

  
  @media print {
    body * {
      visibility: hidden;
    }
    .main-content {
        margin-left: 0 !important;
        padding: 0 !important;
    }
    .main-content *, .main-content *::before, .main-content *::after {
        visibility: hidden;
    }
    .print-section, .print-section * {
      visibility: visible !important;
    }
    .print-section {
      display: block !important;
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
    }
    .sidebar, .top-header, .page-header, .filter-bar, .pagination {
      display: none !important;
    }
  }

</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    // Global LocalStorage Hook
    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = React.useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.log(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.log(error);
        }
      };
      return [storedValue, setValue];
    };

    const Sidebar = ({ activeMenu, activeSub, sidebarOpen }) => {
      const menuItems = [
        { id: 'Dashboard', icon: 'fa-home', label: 'Dashboard', link: 'dashboard.html' },
        { id: 'Students', icon: 'fa-users', label: 'Students', sub: [
            {id: 'All Students', link: 'students.html'},
            {id: 'Add Student', link: 'add-student.html'}
        ]},
        { id: 'Rooms', icon: 'fa-bed', label: 'Rooms', sub: [
            {id: 'All Rooms', link: 'rooms.html'},
            {id: 'Add Room', link: 'add-room.html'}
        ]},
        { id: 'Fees', icon: 'fa-rupee-sign', label: 'Fees', link: 'fee.html' },
        { id: 'Attendance', icon: 'fa-calendar-check', label: 'Attendance', sub: [
            {id: 'Mark Attendance', link: 'attendance.html'},
            {id: 'Attendance Reports', link: 'attendance_reports.html'},
        ]},
        { id: 'Complaints', icon: 'fa-bullhorn', label: 'Complaints', sub: [
            {id: 'All Complaints', link: 'complaints.html'},
            {id: 'Add Complaint', link: 'add_complaint.html'},
        ]},
        { id: 'Reports', icon: 'fa-chart-pie', label: 'Reports', sub: [
            {id: 'Overview', link: 'reports_overview.html'},
            {id: 'Student Reports', link: 'admin_student_reports.html'},
            {id: 'Attendance Reports', link: 'attendance_reports.html'},
            {id: 'Fees Reports', link: 'fee_reports.html'},
            {id: 'Complaints Reports', link: 'complaints_reports.html'},
            {id: 'Room Reports', link: 'room_reports.html'},
            {id: 'Analytics & Export Center', link: 'analytics&report center.html'},
        ]},
        { id: 'Notifications', icon: 'fa-bell', label: 'Notifications', badge: 5, sub: [
            {id: 'All Notifications', link: 'notification.html'},
            {id: 'Send Notification', link: 'send-notification.html'},
        ]},
        { id: 'Settings', icon: 'fa-cog', label: 'Settings', sub: [
            {id: 'General', link: 'settings-general.html'},
            {id: 'Academic', link: 'settings-academic.html'},
            {id: 'Hostel', link: 'settings-hostel.html'},
            {id: 'Fees Settings', link: 'settings-fees.html'},
            {id: 'Notification Settings', link: 'settings-notification.html'},
            {id: 'Security', link: 'settings-security.html'},
            {id: 'Backup & Data', link: 'settings-backup.html'},
            {id: 'System', link: 'settings-system.html'},
            {id: 'Manage Students', link: 'settings-manage-students.html'},
        ]},
      ];

      return (
        <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
          <div className="sidebar-logo">
            <i className="fas fa-building"></i>
            <div>
              <h2>HOSTEL</h2>
              <p>MANAGEMENT SYSTEM</p>
            </div>
          </div>
          <div className="sidebar-menu">
            <div className="menu-label">MAIN MENU</div>
            {menuItems.map(item => {
              const isActive = activeMenu === item.id;
              const hasSub = item.sub && item.sub.length > 0;
              const firstLink = hasSub ? item.sub[0].link : item.link;
              return (
                <React.Fragment key={item.id}>
                  <a href={firstLink} className={`menu-item ${isActive ? 'active' : ''}`}>
                    <div className="menu-item-left">
                      <i className={`fas ${item.icon}`}></i>
                      <span>{item.label}</span>
                    </div>
                    <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
                      {item.badge && <span style={{background:'#EF4444', color:'white', fontSize:'10px', fontWeight:700, minWidth:'18px', height:'18px', borderRadius:'9px', display:'flex', alignItems:'center', justifyContent:'center', padding:'0 4px'}}>{item.badge}</span>}
                      {hasSub && <i className={`fas fa-chevron-${isActive ? 'down' : 'right'}`} style={{fontSize:'10px'}}></i>}
                    </div>
                  </a>
                  {hasSub && isActive && (
                    <div className="sub-menu open">
                      {item.sub.map(subItem => (
                        <a key={subItem.id} href={subItem.link} className={activeSub === subItem.id ? 'active' : ''}>
                          {subItem.id}
                        </a>
                      ))}
                    </div>
                  )}
                </React.Fragment>
              )
            })}
            
            <div className="menu-label" style={{marginTop:'20px'}}>ACCOUNT</div>
            <a href="logout.html" className={`menu-item ${activeMenu === 'Logout' ? 'active' : ''}`}>
              <div className="menu-item-left">
                <i className="fas fa-sign-out-alt"></i>
                <span>Logout</span>
              </div>
            </a>
          </div>
        </div>
      );
    };

    const TopHeader = ({ title, breadcrumb, onToggleSidebar }) => {
      const [now, setNow] = React.useState(new Date());
      const [profileOpen, setProfileOpen] = React.useState(false);
      const [user, setUser] = React.useState({
          name: 'Loading...',
          email: '',
          role: 'Administrator',
          subtext: ''
      });

      React.useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 60000);
        
        // Fetch current logged in user from Supabase
        const checkAuth = async () => {
            if (window.supabaseClient) {
                const { data: { session }, error } = await window.supabaseClient.auth.getSession();
                if (error || !session) {
                    window.location.href = '../login.html';
                } else {
                    const meta = session.user.user_metadata || {};
                    setUser({
                        name: meta.full_name || 'User',
                        email: session.user.email,
                        role: meta.role === 'admin' ? 'Administrator' : 'Student',
                        subtext: meta.employee_id || 'Administrator'
                    });
                }
            }
        };
        checkAuth();

        return () => clearInterval(timer);
      }, []);

      const dateStr = now.toLocaleDateString('en-IN', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
      const timeStr = now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });

      return (
        <div className="top-header">
          <div className="header-left">
            <i className="fas fa-bars hamburger" onClick={onToggleSidebar}></i>
            <div className="page-title">
              {title && <h1>{title}</h1>}
              <div className="breadcrumb">{breadcrumb ? breadcrumb : 'Dashboard'}</div>
            </div>
          </div>
          <div className="header-right">
            <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', padding:'6px 14px', background:'#F8FAFC', borderRadius:'10px', border:'1px solid #F1F5F9'}}>
              <span style={{fontSize:'13px', fontWeight:700, color:'#0F172A'}}>{dateStr}</span>
              <span style={{fontSize:'11px', color:'#94A3B8', fontWeight:600}}>{timeStr}</span>
            </div>
            <div className="notification-btn" onClick={() => window.location.href='notification.html'}>
              <i className="far fa-bell"></i>
              <span className="notification-dot">5</span>
            </div>
            <div style={{position:'relative'}}>
              <div className="user-profile" onClick={() => setProfileOpen(p => !p)} style={{cursor:'pointer'}}>
                <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1D4ED8&color=fff`} alt="Profile" className="user-avatar" />
                <div className="user-info">
                  <span className="user-name">{user.name}</span>
                  <span className="user-role">{user.subtext}</span>
                </div>
                <i className={`fas fa-chevron-${profileOpen ? 'up' : 'down'}`} style={{fontSize:'10px', color:'#64748B', marginLeft:'4px'}}></i>
              </div>
              {profileOpen && (
                <div style={{position:'absolute', top:'52px', right:0, width:'220px', background:'white', borderRadius:'14px', boxShadow:'0 12px 36px rgba(0,0,0,0.14)', border:'1px solid #F1F5F9', zIndex:999, overflow:'hidden'}}>
                  <div style={{padding:'16px', borderBottom:'1px solid #F1F5F9', display:'flex', gap:'12px', alignItems:'center'}}>
                    <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1D4ED8&color=fff&size=48`} style={{width:'44px', height:'44px', borderRadius:'50%'}} alt="Profile" />
                    <div>
                      <div style={{fontSize:'14px', fontWeight:700, color:'#0F172A'}}>{user.name}</div>
                      <div style={{fontSize:'11px', color:'#64748B'}}>{user.email}</div>
                      <div style={{fontSize:'10px', background:'#EFF6FF', color:'#1D4ED8', fontWeight:700, padding:'2px 8px', borderRadius:'10px', display:'inline-block', marginTop:'3px'}}>{user.role}</div>
                    </div>
                  </div>
                  {[
                    { icon:'fa-user', label:'My Profile',    href:'profile.html' },
                    { icon:'fa-shield-alt',label:'Security',     href:'settings_security.html' },
                    { icon:'fa-cog',       label:'Settings',     href:'settings_general.html' },
                  ].map(item => (
                    <a key={item.label} href={item.href} style={{display:'flex', alignItems:'center', gap:'10px', padding:'11px 16px', fontSize:'13px', fontWeight:600, color:'#0F172A', textDecoration:'none', transition:'0.15s'}}
                       onMouseEnter={e => e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                      <i className={`fas ${item.icon}`} style={{color:'#64748B', width:'16px', textAlign:'center'}}></i> {item.label}
                    </a>
                  ))}
                  <div style={{borderTop:'1px solid #F1F5F9'}}>
                    <a href="#" onClick={async (e) => { e.preventDefault(); if(window.supabaseClient) await window.supabaseClient.auth.signOut(); window.location.href='../login.html'; }} style={{display:'flex', alignItems:'center', gap:'10px', padding:'11px 16px', fontSize:'13px', fontWeight:700, color:'#EF4444', textDecoration:'none'}}
                       onMouseEnter={e => e.currentTarget.style.background='#FEF2F2'} onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                      <i className="fas fa-sign-out-alt" style={{width:'16px', textAlign:'center'}}></i> Logout
                    </a>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const Layout = ({ activeMenu, activeSub, title, breadcrumb, children }) => {
      const [sidebarOpen, setSidebarOpen] = React.useState(false);
      const [isLoading, setIsLoading] = React.useState(true);

      React.useEffect(() => {
        const checkSession = async () => {
          if (!window.supabaseClient) {
            console.error("Supabase client not loaded");
            return;
          }
          const { data: { session } } = await window.supabaseClient.auth.getSession();
          if (!session) {
            window.location.href = '../login.html';
            return;
          }
          const userRole = session.user.user_metadata?.role;
          if (userRole !== 'admin') {
             window.location.href = '../login.html';
             return;
          }
          setIsLoading(false);
        };
        checkSession();
      }, []);

      if (isLoading) {
        return <div style={{display:'flex', height:'100vh', width:'100%', alignItems:'center', justifyContent:'center'}}>Loading Admin Portal...</div>;
      }

      return (
        <>
          <div className={`sidebar-overlay ${sidebarOpen ? 'show' : ''}`} onClick={() => setSidebarOpen(false)}></div>
          <Sidebar activeMenu={activeMenu} activeSub={activeSub} sidebarOpen={sidebarOpen} />
          <div className="main-wrapper">
            <TopHeader title={title} breadcrumb={breadcrumb} onToggleSidebar={() => setSidebarOpen(true)} />
            <div className="content-area">
              {children}
            </div>
          </div>
        </>
      );
    };



  const App = () => {
    const [searchTerm, setSearchTerm] = React.useState('');
    const [currentPage, setCurrentPage] = React.useState(1);
    const itemsPerPage = 10;

    React.useEffect(() => { setCurrentPage(1); }, [searchTerm, blockFilter, statusFilter]);
    const [blockFilter, setBlockFilter] = React.useState('All');
    const [statusFilter, setStatusFilter] = React.useState('All');
    const [viewRoom, setViewRoom] = React.useState(null);
    const [deleteRoom, setDeleteRoom] = React.useState(null);
    const [toast, setToast] = React.useState('');
    const [rooms, setRooms] = React.useState([]);
    const [loading, setLoading] = React.useState(true);

    React.useEffect(() => {
      const fetchRooms = async () => {
        if (!window.supabaseClient) return;
        setLoading(true);
        const { data, error } = await window.supabaseClient.from('rooms').select('*').order('room_number');
        if (data) {
          const mappedRooms = data.map(r => ({
            id: r.id,
            no: r.room_number,
            block: r.block,
            floor: r.floor,
            type: r.room_type,
            cap: r.capacity,
            occ: r.occupancy,
            status: r.status,
            facilities: r.facilities || []
          }));
          setRooms(mappedRooms);
        }
        setLoading(false);
      };
      fetchRooms();
    }, []);

    const stats = [
      { title:'Total Rooms',   value: rooms.length, sub:'All Rooms',  icon:'fa-building',  color:'#3B82F6', bg:'#EFF6FF' },
      { title:'Occupied Rooms',value: rooms.filter(r => r.occ > 0).length,  sub: rooms.length > 0 ? Math.round((rooms.filter(r => r.occ > 0).length / rooms.length) * 100) + '%' : '0%',     icon:'fa-bed',       color:'#10B981', bg:'#ECFDF5' },
      { title:'Vacant Rooms',  value: rooms.filter(r => r.occ === 0).length,  sub: rooms.length > 0 ? Math.round((rooms.filter(r => r.occ === 0).length / rooms.length) * 100) + '%' : '0%',     icon:'fa-door-open', color:'#F97316', bg:'#FFF7ED' },
      { title:'Total Blocks',  value: new Set(rooms.map(r => r.block)).size,   sub:'Active Blocks', icon:'fa-city',      color:'#C084FC', bg:'#FAF5FF' },
    ];

    const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

    const filtered = rooms.filter(r => {
      const matchBlock  = blockFilter  === 'All' || r.block  === blockFilter;
      const matchStatus = statusFilter === 'All' || r.status === statusFilter;
      const q = searchTerm.toLowerCase();
      const matchSearch = !q || r.no.toLowerCase().includes(q) || r.type.toLowerCase().includes(q) || r.floor.toLowerCase().includes(q);
      return matchBlock && matchStatus && matchSearch;
    });

    const handleEdit = (rm) => {
      sessionStorage.setItem('editRoom', JSON.stringify(rm));
      window.location.href = 'add-room.html?mode=edit&no=' + encodeURIComponent(rm.no);
    };

    const handleDelete = async () => {
      const { error } = await window.supabaseClient.from('rooms').delete().eq('id', deleteRoom.id);
      if (!error) {
        setRooms(prev => prev.filter(r => r.id !== deleteRoom.id));
        showToast('Room deleted successfully.');
      } else {
        alert("Error deleting room: " + error.message);
      }
      setDeleteRoom(null);
    };

    const handlePrint = (rm) => {
      setViewRoom(rm);
      setTimeout(() => window.print(), 400);
    };

    
    const indexOfLast = currentPage * itemsPerPage;
    const indexOfFirst = indexOfLast - itemsPerPage;
    const currentItems = filtered.slice(indexOfFirst, indexOfLast);
    const totalPages = Math.ceil(filtered.length / itemsPerPage);
return (
      <Layout activeMenu="Rooms" activeSub="All Rooms" title="Rooms" breadcrumb="All Rooms">
        <div className={`success-toast ${toast ? 'show' : ''}`}><i className="fas fa-check-circle"></i> {toast}</div>

        {/* View Modal */}
        <div className={`modal-overlay ${viewRoom ? 'open' : ''}`} onClick={e => { if(e.target.className.includes('modal-overlay')) setViewRoom(null); }}>
          <div className="modal-box">
            {viewRoom && (<>
              <div className="modal-head">
                <div><h3>Room Details — {viewRoom.no}</h3><p>{viewRoom.block} · {viewRoom.floor}</p></div>
                <button className="modal-close" onClick={() => setViewRoom(null)}><i className="fas fa-times"></i></button>
              </div>
              <div className="modal-body">
                <div style={{textAlign:'center', marginBottom:'20px'}}>
                  <div style={{width:'64px', height:'64px', borderRadius:'16px', background:'#EFF6FF', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px', fontSize:'28px', color:'#3B82F6'}}>
                    <i className="fas fa-bed"></i>
                  </div>
                  <div style={{fontWeight:700, fontSize:'20px', color:'#0F172A'}}>{viewRoom.no}</div>
                  <span className={viewRoom.status === 'Occupied' ? 'status-occupied' : 'status-available'} style={{marginTop:'6px', display:'inline-block'}}>{viewRoom.status}</span>
                </div>
                <div className="detail-grid">
                  <div className="detail-item"><label>BLOCK</label><span>{viewRoom.block}</span></div>
                  <div className="detail-item"><label>FLOOR</label><span>{viewRoom.floor}</span></div>
                  <div className="detail-item"><label>ROOM TYPE</label><span>{viewRoom.type}</span></div>
                  <div className="detail-item"><label>CAPACITY</label><span>{viewRoom.cap} beds</span></div>
                  <div className="detail-item"><label>OCCUPIED</label><span>{viewRoom.occ}</span></div>
                  <div className="detail-item"><label>VACANT</label><span>{viewRoom.cap - viewRoom.occ}</span></div>
                  <hr className="detail-sep"/>
                  <div className="detail-item" style={{gridColumn:'1/-1'}}>
                    <label>FACILITIES</label>
                    <div style={{marginTop:'6px'}}>{viewRoom.facilities.map((f,i) => <span key={i} className="facility-tag">{f}</span>)}</div>
                  </div>
                </div>
              </div>
              <div className="modal-actions">
                <button className="btn-modal-print" onClick={() => handlePrint(viewRoom)}><i className="fas fa-print"></i> Print</button>
                <button className="btn-modal-edit"  onClick={() => { setViewRoom(null); handleEdit(viewRoom); }}><i className="fas fa-edit"></i> Edit Room</button>
              </div>
            </>)}
          </div>
        </div>

        {/* Delete Confirm */}
        <div className={`confirm-overlay ${deleteRoom ? 'open' : ''}`}>
          <div className="confirm-box">
            <div className="confirm-icon"><i className="fas fa-trash"></i></div>
            <h3>Delete Room?</h3>
            <p>Are you sure you want to delete room <strong>{deleteRoom?.no}</strong>? This action cannot be undone.</p>
            <div className="confirm-btns">
              <button className="btn-cancel-del" onClick={() => setDeleteRoom(null)}>Cancel</button>
              <button className="btn-confirm-del" onClick={handleDelete}>Yes, Delete</button>
            </div>
          </div>
        </div>

        {/* Stats */}
        <div className="stats-row">
          {stats.map((s,i) => (
            <div className="stat-card-rm" key={i}>
              <div className="stat-icon-rm" style={{background: s.bg, color: s.color}}><i className={`fas ${s.icon}`}></i></div>
              <div className="stat-info-rm">
                <span className="stat-title-rm">{s.title}</span>
                <span className="stat-value-rm">{s.value}</span>
                <span className="stat-sub-rm">{s.sub}</span>
              </div>
            </div>
          ))}
        </div>

        {/* Table */}
        <div className="table-section">
          <div className="table-header">
            <h3>Rooms List <span style={{fontSize:'13px', color:'#64748B', fontWeight:500}}>({filtered.length} records)</span></h3>
            <div className="table-actions">
              <select value={blockFilter} onChange={e => setBlockFilter(e.target.value)}>
                {['All','Block A','Block B','Block C','Block D'].map(b => <option key={b}>{b}</option>)}
              </select>
              <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
                <option>All</option><option>Occupied</option><option>Available</option>
              </select>
              <div style={{position:'relative'}}>
                <i className="fas fa-search" style={{position:'absolute', left:'10px', top:'50%', transform:'translateY(-50%)', color:'#94A3B8', fontSize:'12px'}}></i>
                <input type="text" placeholder="Search room or type..." style={{paddingLeft:'30px', width:'200px'}} value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
              </div>
              <a href="add-room.html" className="btn-add-room"><i className="fas fa-plus"></i> Add Room</a>
            </div>
          </div>

          <table>
            <thead>
              <tr><th>#</th><th>Room No.</th><th>Block</th><th>Floor</th><th>Type</th><th>Capacity</th><th>Occupied</th><th>Vacant</th><th>Occupancy</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {loading ? (
                <tr><td colSpan={11} style={{textAlign:'center', padding:'40px', color:'#94A3B8'}}>Loading rooms from database...</td></tr>
              ) : filtered.length === 0 ? (
                <tr><td colSpan={11} style={{textAlign:'center', padding:'40px', color:'#94A3B8'}}>No rooms found.</td></tr>
              ) : currentItems.map((rm,i) => {
                const vac = rm.cap - rm.occ;
                const pct = Math.round((rm.occ / rm.cap) * 100);
                const barColor = pct === 100 ? '#EF4444' : pct >= 50 ? '#F59E0B' : '#10B981';
                return (
                  <tr key={rm.no}>
                    <td style={{color:'#94A3B8'}}>{i+1}</td>
                    <td style={{color:'#0F172A', fontWeight:700}}>{rm.no}</td>
                    <td>{rm.block}</td>
                    <td>{rm.floor}</td>
                    <td>{rm.type}</td>
                    <td style={{textAlign:'center'}}>{rm.cap}</td>
                    <td style={{textAlign:'center', color:'#0F172A', fontWeight:600}}>{rm.occ}</td>
                    <td style={{textAlign:'center', color: vac===0 ? '#EF4444' : '#10B981', fontWeight:600}}>{vac}</td>
                    <td>
                      <div className="capacity-bar">
                        <div className="cap-bar-bg"><div className="cap-bar-fill" style={{width:`${pct}%`, background: barColor}}></div></div>
                        <span style={{fontSize:'11px', fontWeight:600, color:'#475569'}}>{pct}%</span>
                      </div>
                    </td>
                    <td><span className={rm.status === 'Occupied' ? 'status-occupied' : 'status-available'}>{rm.status}</span></td>
                    <td>
                      <button className="action-btn"       title="View"   onClick={() => setViewRoom(rm)}><i className="fas fa-eye"></i></button>
                      <button className="action-btn green" title="Edit"   onClick={() => handleEdit(rm)}><i className="fas fa-edit"></i></button>
                      <button className="action-btn"       title="Print"  onClick={() => handlePrint(rm)}><i className="fas fa-print"></i></button>
                      <button className="action-btn red"   title="Delete" onClick={() => setDeleteRoom(rm)}><i className="fas fa-trash"></i></button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          <div className="pagination" style={{padding: '0 16px 16px', display: 'flex', flexDirection: 'column', alignItems: 'flex-end', borderTop: 'none', marginTop: '0'}}>
            <div style={{display: 'flex', gap: '6px', marginBottom: '12px'}}>
              <button className="page-btn" onClick={() => setCurrentPage(1)} disabled={currentPage === 1}>«</button>
              {[...Array(Math.min(totalPages, 8)).keys()].map(p => {
                let pageNum = p + 1;
                if (totalPages > 8 && currentPage > 4 && p < 7) {
                  pageNum = currentPage - 3 + p;
                  if (pageNum > totalPages) return null;
                }
                if (pageNum <= totalPages) {
                  return (
                    <button key={pageNum} className={`page-btn ${currentPage === pageNum ? 'active-page' : ''}`} onClick={() => setCurrentPage(pageNum)} style={currentPage === pageNum ? {background: 'var(--primary)', color: 'white', borderColor: 'var(--primary)'} : {}}>
                      {pageNum}
                    </button>
                  );
                }
                return null;
              })}
              {totalPages > 8 && currentPage < totalPages - 3 && <span className="page-btn" style={{border:'none'}}>...</span>}
              {totalPages > 8 && currentPage < totalPages - 2 && (
                <button className="page-btn" onClick={() => setCurrentPage(totalPages)}>{totalPages}</button>
              )}
              <button className="page-btn" onClick={() => setCurrentPage(currentPage + 1)} disabled={currentPage === totalPages}>»</button>
            </div>
            <div style={{fontSize:'12px', color:'var(--text-muted)'}}>
              Showing {indexOfFirst+1} to {Math.min(indexOfLast, filtered.length)} of {filtered.length} records
            </div>
          </div>
        </div>
      </Layout>
    );
  };


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
