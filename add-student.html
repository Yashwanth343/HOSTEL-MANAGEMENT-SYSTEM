<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIMS | Add Student</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase_client.js"></script>
  
  <style>

    :root {
      --primary: #1D4ED8;
      --sidebar-bg: #0B192C;
      --sidebar-hover: #1E3A8A;
      --bg-color: #F8FAFC;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
      --white: #FFFFFF;
      --danger: #EF4444;
      --success: #10B981;
      --warning: #F59E0B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Layout */
    #root { display: flex; width: 100%; }
    
    /* Sidebar */
    .sidebar { width: 260px; background-color: var(--sidebar-bg); color: var(--white); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.3s; z-index: 100; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
    .sidebar-logo { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sidebar-logo i { font-size: 28px; }
    .sidebar-logo h2 { font-size: 18px; font-weight: 800; letter-spacing: 1px; line-height: 1.1; margin:0;}
    .sidebar-logo p { font-size: 9px; font-weight: 500; letter-spacing: 1px; color: #94A3B8; margin:0;}
    
    .sidebar-menu { flex: 1; padding: 20px 12px; }
    .menu-label { font-size: 10px; font-weight: 700; color: #475569; letter-spacing: 1.5px; padding: 0 16px; margin: 16px 0 8px; }
    .menu-item { padding: 11px 16px; margin-bottom: 2px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #CBD5E1; font-size: 13.5px; font-weight: 500; transition: 0.2s; text-decoration: none; }
    .menu-item:hover { background-color: rgba(255,255,255,0.07); color: var(--white); }
    .menu-item.active { background-color: var(--primary); color: var(--white); }
    .menu-item-left { display: flex; align-items: center; gap: 12px; }
    .menu-item-left i { width: 18px; text-align: center; font-size: 15px; }
    
    .sub-menu { display: none; flex-direction: column; padding-left: 46px; margin-bottom: 4px; }
    .sub-menu.open { display: flex; }
    .sub-menu a { color: #94A3B8; text-decoration: none; padding: 8px 12px; font-size: 13px; font-weight: 500; transition: 0.2s; border-radius: 6px; display: block; }
    .sub-menu a:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .sub-menu a.active { color: var(--white); background-color: rgba(29,78,216,0.5); }
    
    /* Main Content */
    .main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    
    /* Top Header */
    .top-header { height: 70px; background-color: var(--white); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 90; }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .hamburger { font-size: 20px; color: var(--text-muted); cursor: pointer; }
    .page-title { display: flex; flex-direction: column; gap: 4px;}
    .page-title h1 { font-size: 20px; font-weight: 700; color: var(--text-main); margin:0; line-height:1;}
    .breadcrumb { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    
    .header-right { display: flex; align-items: center; gap: 20px; }
    .date-picker-btn { border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-main); display: flex; align-items: center; gap: 8px; cursor: pointer; background: white; }
    .notification-btn { position: relative; cursor: pointer; color: var(--text-muted); font-size: 20px; }
    .notification-dot { position: absolute; top: -4px; right: -4px; background: var(--danger); color: white; font-size: 10px; font-weight: bold; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
    .user-profile { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #E2E8F0; }
    .user-info { display: flex; flex-direction: column; }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text-main); }
    .user-role { font-size: 11px; color: var(--text-muted); }
    
    
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 95; backdrop-filter: blur(2px); }
    
    @media (max-width: 900px) {
        .sidebar { position: fixed; left: -260px; z-index: 100; transition: left 0.3s; }
        .sidebar.open { left: 0; box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
        .sidebar-overlay.show { display: block; }
        
        .top-header { padding: 0 16px; }
        .header-right > div:first-child { display: none !important; } /* Hide date on mobile */
        .page-title h1 { font-size: 16px; }
        .breadcrumb { font-size: 10px; }
        
        .content-area { padding: 16px; }
        .grid-2, .grid-3, .grid-4, .form-grid, .info-grid, .charts-grid, .bottom-grid, .kpi-grid, .stat-grid, .metrics-grid, .reports-grid { grid-template-columns: 1fr !important; }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { white-space: nowrap; }
        
        .card-body, .panel-body, .card-content { overflow-x: auto; }
        .auth-container { flex-direction: column; }
    }

    /* Content Area */
    .content-area { padding: 24px; flex: 1; overflow-y: auto; }


  .page-container { max-width: 900px; margin: 0 auto; }
  .form-card { background: white; border-radius: 16px; border: 1px solid #F1F5F9; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; }
  .form-card-header { padding: 24px 32px; border-bottom: 1px solid #F1F5F9; display: flex; justify-content: space-between; align-items: center; }
  .form-card-header h2 { font-size: 18px; font-weight: 700; color: #0F172A; }
  .form-card-header p { font-size: 13px; color: #64748B; margin-top: 4px; }
  .btn-back { padding: 8px 16px; border: 1px solid #E2E8F0; background: white; border-radius: 8px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .form-body { padding: 32px; }

  /* Photo upload */
  .photo-section { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid #F1F5F9; }
  .photo-circle { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #E2E8F0; display: flex; align-items: center; justify-content: center; background: #F8FAFC; overflow: hidden; flex-shrink: 0; }
  .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
  .photo-circle i { font-size: 42px; color: #CBD5E1; }
  .photo-upload-box { flex: 1; border: 2px dashed #E2E8F0; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: 0.2s; }
  .photo-upload-box:hover { border-color: #3B82F6; background: #EFF6FF; }
  .photo-upload-box i.pu-icon { font-size: 28px; color: #94A3B8; margin-bottom: 8px; display: block; }
  .upload-title { font-size: 14px; font-weight: 600; color: #0F172A; margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: #64748B; }
  .upload-label { display: inline-block; margin-top: 12px; padding: 7px 18px; background: #1D4ED8; color: white; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .upload-label:hover { background: #1E40AF; }
  .upload-error { font-size: 11px; color: #EF4444; margin-top: 6px; }

  .section-title { font-size: 14px; font-weight: 700; color: #0F172A; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid #F1F5F9; display: flex; align-items: center; gap: 8px; }
  .section-title i { color: #3B82F6; }
  .form-section { margin-bottom: 32px; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .form-grid-1 { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 13px; color: #0F172A; outline: none; transition: 0.2s; background: white; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .input-with-icon { position: relative; }
  .input-with-icon i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94A3B8; font-size: 13px; }
  .input-with-icon input { padding-left: 34px; }
  .required { color: #EF4444; }

  .form-actions { display: flex; justify-content: flex-end; gap: 12px; padding-top: 24px; border-top: 1px solid #F1F5F9; margin-top: 8px; }
  .btn-cancel-form { padding: 10px 24px; border: 1px solid #E2E8F0; background: white; border-radius: 8px; font-size: 13px; font-weight: 600; color: #0F172A; cursor: pointer; }
  .btn-reset-form { padding: 10px 24px; border: 1px solid #FEF3C7; background: #FFFBEB; border-radius: 8px; font-size: 13px; font-weight: 600; color: #D97706; cursor: pointer; }
  .btn-save-form { padding: 10px 28px; border: none; background: #1D4ED8; border-radius: 8px; font-size: 13px; font-weight: 700; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
  .btn-save-form:hover { background: #1E40AF; }

  .success-toast { display: none; position: fixed; top: 24px; right: 24px; background: #10B981; color: white; padding: 16px 24px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-weight: 600; font-size: 14px; z-index: 9999; align-items: center; gap: 10px; }
  .success-toast.show { display: flex; }
  .edit-banner { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; margin-bottom: 24px; font-size: 13px; font-weight: 600; color: #92400E; }

  
  @media print {
    body * {
      visibility: hidden;
    }
    .main-content {
        margin-left: 0 !important;
        padding: 0 !important;
    }
    .main-content *, .main-content *::before, .main-content *::after {
        visibility: hidden;
    }
    .print-section, .print-section * {
      visibility: visible !important;
    }
    .print-section {
      display: block !important;
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
    }
    .sidebar, .top-header, .page-header, .filter-bar, .pagination {
      display: none !important;
    }
  }

</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    // Global LocalStorage Hook
    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = React.useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.log(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.log(error);
        }
      };
      return [storedValue, setValue];
    };

    const Sidebar = ({ activeMenu, activeSub, sidebarOpen }) => {
      const menuItems = [
        { id: 'Dashboard', icon: 'fa-home', label: 'Dashboard', link: 'dashboard.html' },
        { id: 'Students', icon: 'fa-users', label: 'Students', sub: [
            {id: 'All Students', link: 'students.html'},
            {id: 'Add Student', link: 'add-student.html'}
        ]},
        { id: 'Rooms', icon: 'fa-bed', label: 'Rooms', sub: [
            {id: 'All Rooms', link: 'rooms.html'},
            {id: 'Add Room', link: 'add-room.html'}
        ]},
        { id: 'Fees', icon: 'fa-rupee-sign', label: 'Fees', link: 'fee.html' },
        { id: 'Attendance', icon: 'fa-calendar-check', label: 'Attendance', sub: [
            {id: 'Mark Attendance', link: 'attendance.html'},
            {id: 'Attendance Reports', link: 'attendance_reports.html'},
        ]},
        { id: 'Complaints', icon: 'fa-bullhorn', label: 'Complaints', sub: [
            {id: 'All Complaints', link: 'complaints.html'},
            {id: 'Add Complaint', link: 'add_complaint.html'},
        ]},
        { id: 'Reports', icon: 'fa-chart-pie', label: 'Reports', sub: [
            {id: 'Overview', link: 'reports_overview.html'},
            {id: 'Student Reports', link: 'admin_student_reports.html'},
            {id: 'Attendance Reports', link: 'attendance_reports.html'},
            {id: 'Fees Reports', link: 'fee_reports.html'},
            {id: 'Complaints Reports', link: 'complaints_reports.html'},
            {id: 'Room Reports', link: 'room_reports.html'},
            {id: 'Analytics & Export Center', link: 'analytics&report center.html'},
        ]},
        { id: 'Notifications', icon: 'fa-bell', label: 'Notifications', badge: 5, sub: [
            {id: 'All Notifications', link: 'notification.html'},
            {id: 'Send Notification', link: 'send-notification.html'},
        ]},
        { id: 'Settings', icon: 'fa-cog', label: 'Settings', sub: [
            {id: 'General', link: 'settings-general.html'},
            {id: 'Academic', link: 'settings-academic.html'},
            {id: 'Hostel', link: 'settings-hostel.html'},
            {id: 'Fees Settings', link: 'settings-fees.html'},
            {id: 'Notification Settings', link: 'settings-notification.html'},
            {id: 'Security', link: 'settings-security.html'},
            {id: 'Backup & Data', link: 'settings-backup.html'},
            {id: 'System', link: 'settings-system.html'},
            {id: 'Manage Students', link: 'settings-manage-students.html'},
        ]},
      ];

      return (
        <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
          <div className="sidebar-logo">
            <i className="fas fa-building"></i>
            <div>
              <h2>HOSTEL</h2>
              <p>MANAGEMENT SYSTEM</p>
            </div>
          </div>
          <div className="sidebar-menu">
            <div className="menu-label">MAIN MENU</div>
            {menuItems.map(item => {
              const isActive = activeMenu === item.id;
              const hasSub = item.sub && item.sub.length > 0;
              const firstLink = hasSub ? item.sub[0].link : item.link;
              return (
                <React.Fragment key={item.id}>
                  <a href={firstLink} className={`menu-item ${isActive ? 'active' : ''}`}>
                    <div className="menu-item-left">
                      <i className={`fas ${item.icon}`}></i>
                      <span>{item.label}</span>
                    </div>
                    <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
                      {item.badge && <span style={{background:'#EF4444', color:'white', fontSize:'10px', fontWeight:700, minWidth:'18px', height:'18px', borderRadius:'9px', display:'flex', alignItems:'center', justifyContent:'center', padding:'0 4px'}}>{item.badge}</span>}
                      {hasSub && <i className={`fas fa-chevron-${isActive ? 'down' : 'right'}`} style={{fontSize:'10px'}}></i>}
                    </div>
                  </a>
                  {hasSub && isActive && (
                    <div className="sub-menu open">
                      {item.sub.map(subItem => (
                        <a key={subItem.id} href={subItem.link} className={activeSub === subItem.id ? 'active' : ''}>
                          {subItem.id}
                        </a>
                      ))}
                    </div>
                  )}
                </React.Fragment>
              )
            })}
            
            <div className="menu-label" style={{marginTop:'20px'}}>ACCOUNT</div>
            <a href="logout.html" className={`menu-item ${activeMenu === 'Logout' ? 'active' : ''}`}>
              <div className="menu-item-left">
                <i className="fas fa-sign-out-alt"></i>
                <span>Logout</span>
              </div>
            </a>
          </div>
        </div>
      );
    };

    const TopHeader = ({ title, breadcrumb, onToggleSidebar }) => {
      const [now, setNow] = React.useState(new Date());
      const [profileOpen, setProfileOpen] = React.useState(false);
      const [user, setUser] = React.useState({
          name: 'Loading...',
          email: '',
          role: 'Administrator',
          subtext: ''
      });

      React.useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 60000);
        
        // Fetch current logged in user from Supabase
        const checkAuth = async () => {
            if (window.supabaseClient) {
                const { data: { session }, error } = await window.supabaseClient.auth.getSession();
                if (error || !session) {
                    window.location.href = '../login.html';
                } else {
                    const meta = session.user.user_metadata || {};
                    setUser({
                        name: meta.full_name || 'User',
                        email: session.user.email,
                        role: meta.role === 'admin' ? 'Administrator' : 'Student',
                        subtext: meta.employee_id || 'Administrator'
                    });
                }
            }
        };
        checkAuth();

        return () => clearInterval(timer);
      }, []);

      const dateStr = now.toLocaleDateString('en-IN', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
      const timeStr = now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });

      return (
        <div className="top-header">
          <div className="header-left">
            <i className="fas fa-bars hamburger" onClick={onToggleSidebar}></i>
            <div className="page-title">
              {title && <h1>{title}</h1>}
              <div className="breadcrumb">{breadcrumb ? breadcrumb : 'Dashboard'}</div>
            </div>
          </div>
          <div className="header-right">
            <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', padding:'6px 14px', background:'#F8FAFC', borderRadius:'10px', border:'1px solid #F1F5F9'}}>
              <span style={{fontSize:'13px', fontWeight:700, color:'#0F172A'}}>{dateStr}</span>
              <span style={{fontSize:'11px', color:'#94A3B8', fontWeight:600}}>{timeStr}</span>
            </div>
            <div className="notification-btn" onClick={() => window.location.href='notification.html'}>
              <i className="far fa-bell"></i>
              <span className="notification-dot">5</span>
            </div>
            <div style={{position:'relative'}}>
              <div className="user-profile" onClick={() => setProfileOpen(p => !p)} style={{cursor:'pointer'}}>
                <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1D4ED8&color=fff`} alt="Profile" className="user-avatar" />
                <div className="user-info">
                  <span className="user-name">{user.name}</span>
                  <span className="user-role">{user.subtext}</span>
                </div>
                <i className={`fas fa-chevron-${profileOpen ? 'up' : 'down'}`} style={{fontSize:'10px', color:'#64748B', marginLeft:'4px'}}></i>
              </div>
              {profileOpen && (
                <div style={{position:'absolute', top:'52px', right:0, width:'220px', background:'white', borderRadius:'14px', boxShadow:'0 12px 36px rgba(0,0,0,0.14)', border:'1px solid #F1F5F9', zIndex:999, overflow:'hidden'}}>
                  <div style={{padding:'16px', borderBottom:'1px solid #F1F5F9', display:'flex', gap:'12px', alignItems:'center'}}>
                    <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1D4ED8&color=fff&size=48`} style={{width:'44px', height:'44px', borderRadius:'50%'}} alt="Profile" />
                    <div>
                      <div style={{fontSize:'14px', fontWeight:700, color:'#0F172A'}}>{user.name}</div>
                      <div style={{fontSize:'11px', color:'#64748B'}}>{user.email}</div>
                      <div style={{fontSize:'10px', background:'#EFF6FF', color:'#1D4ED8', fontWeight:700, padding:'2px 8px', borderRadius:'10px', display:'inline-block', marginTop:'3px'}}>{user.role}</div>
                    </div>
                  </div>
                  {[
                    { icon:'fa-user', label:'My Profile',    href:'profile.html' },
                    { icon:'fa-shield-alt',label:'Security',     href:'settings_security.html' },
                    { icon:'fa-cog',       label:'Settings',     href:'settings_general.html' },
                  ].map(item => (
                    <a key={item.label} href={item.href} style={{display:'flex', alignItems:'center', gap:'10px', padding:'11px 16px', fontSize:'13px', fontWeight:600, color:'#0F172A', textDecoration:'none', transition:'0.15s'}}
                       onMouseEnter={e => e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                      <i className={`fas ${item.icon}`} style={{color:'#64748B', width:'16px', textAlign:'center'}}></i> {item.label}
                    </a>
                  ))}
                  <div style={{borderTop:'1px solid #F1F5F9'}}>
                    <a href="#" onClick={async (e) => { e.preventDefault(); if(window.supabaseClient) await window.supabaseClient.auth.signOut(); window.location.href='../login.html'; }} style={{display:'flex', alignItems:'center', gap:'10px', padding:'11px 16px', fontSize:'13px', fontWeight:700, color:'#EF4444', textDecoration:'none'}}
                       onMouseEnter={e => e.currentTarget.style.background='#FEF2F2'} onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                      <i className="fas fa-sign-out-alt" style={{width:'16px', textAlign:'center'}}></i> Logout
                    </a>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const Layout = ({ activeMenu, activeSub, title, breadcrumb, children }) => {
      const [sidebarOpen, setSidebarOpen] = React.useState(false);
      const [isLoading, setIsLoading] = React.useState(true);

      React.useEffect(() => {
        const checkSession = async () => {
          if (!window.supabaseClient) {
            console.error("Supabase client not loaded");
            return;
          }
          const { data: { session } } = await window.supabaseClient.auth.getSession();
          if (!session) {
            window.location.href = '../login.html';
            return;
          }
          const userRole = session.user.user_metadata?.role;
          if (userRole !== 'admin') {
             window.location.href = '../login.html';
             return;
          }
          setIsLoading(false);
        };
        checkSession();
      }, []);

      if (isLoading) {
        return <div style={{display:'flex', height:'100vh', width:'100%', alignItems:'center', justifyContent:'center'}}>Loading Admin Portal...</div>;
      }

      return (
        <>
          <div className={`sidebar-overlay ${sidebarOpen ? 'show' : ''}`} onClick={() => setSidebarOpen(false)}></div>
          <Sidebar activeMenu={activeMenu} activeSub={activeSub} sidebarOpen={sidebarOpen} />
          <div className="main-wrapper">
            <TopHeader title={title} breadcrumb={breadcrumb} onToggleSidebar={() => setSidebarOpen(true)} />
            <div className="content-area">
              {children}
            </div>
          </div>
        </>
      );
    };



  const App = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const isEdit = urlParams.get('mode') === 'edit';
    const editData = isEdit ? JSON.parse(sessionStorage.getItem('editStudent') || '{}') : {};

    const [photoSrc, setPhotoSrc] = React.useState(editData.photoSrc || null);
    const [photoError, setPhotoError] = React.useState('');
    const [formData, setFormData] = React.useState({
      fullName:      editData.name         || '',
      rollNumber:    editData.roll         || '',
      department:    editData.dept         || '',
      year:          editData.year         || '',
      email:         editData.email        || '',
      phone:         editData.phone        || '',
      roomNumber:    editData.room         || '',
      gender:        editData.gender       || 'Male',
      feeStatus:     editData.status       || '',
      address:       editData.address      || '',
      guardianName:  editData.guardian     || '',
      guardianPhone: editData.gPhone       || '',
      joinDate:      editData.joinDate     || '',
    });
    const [submitted, setSubmitted] = React.useState(false);

    const handleChange = (field, value) => setFormData(prev => ({...prev, [field]: value}));

    const handlePhotoChange = (e) => {
      const file = e.target.files[0];
      setPhotoError('');
      if (!file) return;
      if (!['image/jpeg','image/png','image/jpg'].includes(file.type)) {
        setPhotoError('Only JPG and PNG files are allowed.');
        return;
      }
      if (file.size > 2 * 1024 * 1024) {
        setPhotoError('File size must be less than 2MB.');
        return;
      }
      const reader = new FileReader();
      reader.onload = (ev) => setPhotoSrc(ev.target.result);
      reader.readAsDataURL(file);
    };

    const handleSubmit = (e) => {
      e.preventDefault();
      // Fetch existing
      let stored = [];
      try {
        const item = window.localStorage.getItem('hims_students');
        if (item) stored = JSON.parse(item);
      } catch(e) {}
      
      const newStudent = { ...formData, id: Date.now(), status: 'Paid', joinDate: new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}) };
      
      if (editMode && formData.id) {
         stored = stored.map(s => s.id === formData.id ? { ...s, ...formData } : s);
         showToast('Student updated successfully!');
      } else {
         stored.push(newStudent);
         showToast('Student added successfully!');
      }
      
      window.localStorage.setItem('hims_students', JSON.stringify(stored));
      setTimeout(() => { window.location.href = 'students.html'; }, 1500);
    };

    const handleReset = () => {
      setFormData({ fullName:'', rollNumber:'', department:'', year:'', email:'', phone:'', roomNumber:'', gender:'Male', feeStatus:'', address:'', guardianName:'', guardianPhone:'', joinDate:'' });
      setPhotoSrc(null);
      setPhotoError('');
    };

    return (
      <Layout activeMenu="Students" activeSub="Add Student" title={isEdit ? 'Edit Student' : 'Add Student'} breadcrumb={`Students > ${isEdit ? 'Edit Student' : 'Add Student'}`}>
        <div className={`success-toast ${submitted ? 'show' : ''}`}>
          <i className="fas fa-check-circle"></i> {isEdit ? 'Student updated successfully!' : 'Student added successfully!'}
        </div>

        <div className="page-container">
          <div className="form-card">
            <div className="form-card-header">
              <div>
                <h2>{isEdit ? 'Edit Student Details' : 'Add New Student'}</h2>
                <p>{isEdit ? 'Update the student information below.' : 'Fill in all required fields to register a new student.'}</p>
              </div>
              <a href="students.html" className="btn-back"><i className="fas fa-arrow-left"></i> Back to Students</a>
            </div>

            <div className="form-body">
              {isEdit && (
                <div className="edit-banner">
                  <i className="fas fa-edit"></i> You are editing: <strong>{formData.fullName}</strong> ({editData.roll})
                </div>
              )}
              <form onSubmit={handleSubmit}>

                {/* Photo Upload */}
                <div className="photo-section">
                  <div className="photo-circle">
                    {photoSrc ? (
                      <img src={photoSrc} alt="Student" />
                    ) : formData.fullName ? (
                      <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(formData.fullName)}&size=100&background=1D4ED8&color=fff`} alt="Avatar" />
                    ) : (
                      <i className="fas fa-user-circle"></i>
                    )}
                  </div>
                  <div>
                    <label className="photo-upload-box" htmlFor="studentPhoto" style={{display:'block', cursor:'pointer'}}>
                      <i className="fas fa-cloud-upload-alt pu-icon"></i>
                      <div className="upload-title">Upload Student Photo</div>
                      <div className="upload-sub">Drag & drop or click to browse • JPG / PNG • Max 2MB</div>
                      <span className="upload-label">Choose File</span>
                    </label>
                    <input type="file" id="studentPhoto" accept="image/jpeg,image/png,image/jpg" style={{display:'none'}} onChange={handlePhotoChange} />
                    {photoError && <div className="upload-error"><i className="fas fa-exclamation-circle"></i> {photoError}</div>}
                    {photoSrc && <div style={{fontSize:'11px', color:'#10B981', marginTop:'6px'}}><i className="fas fa-check-circle"></i> Photo uploaded successfully</div>}
                  </div>
                </div>

                {/* Personal Info */}
                <div className="form-section">
                  <div className="section-title"><i className="fas fa-user"></i> Personal Information</div>
                  <div className="form-grid-2">
                    <div className="form-group"><label>Full Name <span className="required">*</span></label>
                      <input type="text" placeholder="Enter full name" value={formData.fullName} onChange={e => handleChange('fullName', e.target.value)} required />
                    </div>
                    <div className="form-group"><label>Roll Number <span className="required">*</span></label>
                      <input type="text" placeholder="e.g. CS2021001" value={formData.rollNumber} onChange={e => handleChange('rollNumber', e.target.value)} required />
                    </div>
                  </div>
                  <div className="form-grid-3">
                    <div className="form-group"><label>Department <span className="required">*</span></label>
                      <select value={formData.department} onChange={e => handleChange('department', e.target.value)} required>
                        <option value="">Select department</option>
                        <option>Computer Science</option><option>Mechanical Engg.</option>
                        <option>Electronics Engg.</option><option>Civil Engineering</option>
                        <option>Info. Technology</option><option>Electrical Engg.</option>
                      </select>
                    </div>
                    <div className="form-group"><label>Year <span className="required">*</span></label>
                      <select value={formData.year} onChange={e => handleChange('year', e.target.value)} required>
                        <option value="">Select year</option>
                        <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
                      </select>
                    </div>
                    <div className="form-group"><label>Gender <span className="required">*</span></label>
                      <select value={formData.gender} onChange={e => handleChange('gender', e.target.value)}>
                        <option>Male</option><option>Female</option><option>Other</option>
                      </select>
                    </div>
                  </div>
                  <div className="form-grid-1 form-group"><label>Permanent Address</label>
                    <textarea rows="2" placeholder="Enter permanent address" value={formData.address} onChange={e => handleChange('address', e.target.value)}></textarea>
                  </div>
                </div>

                {/* Contact Info */}
                <div className="form-section">
                  <div className="section-title"><i className="fas fa-phone"></i> Contact Information</div>
                  <div className="form-grid-2">
                    <div className="form-group"><label>Email Address <span className="required">*</span></label>
                      <div className="input-with-icon"><i className="far fa-envelope"></i>
                        <input type="email" placeholder="student@email.com" value={formData.email} onChange={e => handleChange('email', e.target.value)} required />
                      </div>
                    </div>
                    <div className="form-group"><label>Phone Number <span className="required">*</span></label>
                      <div className="input-with-icon"><i className="fas fa-phone"></i>
                        <input type="tel" placeholder="+91 XXXXX XXXXX" value={formData.phone} onChange={e => handleChange('phone', e.target.value)} required />
                      </div>
                    </div>
                    <div className="form-group"><label>Guardian Name</label>
                      <input type="text" placeholder="Parent / Guardian name" value={formData.guardianName} onChange={e => handleChange('guardianName', e.target.value)} />
                    </div>
                    <div className="form-group"><label>Guardian Phone</label>
                      <input type="tel" placeholder="+91 XXXXX XXXXX" value={formData.guardianPhone} onChange={e => handleChange('guardianPhone', e.target.value)} />
                    </div>
                  </div>
                </div>

                {/* Hostel Info */}
                <div className="form-section">
                  <div className="section-title"><i className="fas fa-building"></i> Hostel Information</div>
                  <div className="form-grid-3">
                    <div className="form-group"><label>Room Number <span className="required">*</span></label>
                      <select value={formData.roomNumber} onChange={e => handleChange('roomNumber', e.target.value)} required>
                        <option value="">Select room</option>
                        <option>A-101</option><option>A-102</option><option>A-103</option><option>A-104</option>
                        <option>B-201</option><option>B-202</option><option>B-203</option><option>B-204</option>
                        <option>C-301</option><option>C-302</option>
                      </select>
                    </div>
                    <div className="form-group"><label>Fee Status <span className="required">*</span></label>
                      <select value={formData.feeStatus} onChange={e => handleChange('feeStatus', e.target.value)} required>
                        <option value="">Select status</option><option>Paid</option><option>Pending</option>
                      </select>
                    </div>
                    <div className="form-group"><label>Join Date</label>
                      <input type="date" value={formData.joinDate} onChange={e => handleChange('joinDate', e.target.value)} />
                    </div>
                  </div>
                </div>

                <div className="form-actions">
                  <button type="button" className="btn-cancel-form" onClick={() => window.location.href='students.html'}>Cancel</button>
                  <button type="button" className="btn-reset-form" onClick={handleReset}><i className="fas fa-redo"></i> Reset</button>
                  <button type="submit" className="btn-save-form">
                    <i className={`fas ${isEdit ? 'fa-save' : 'fa-user-plus'}`}></i>
                    {isEdit ? 'Save Changes' : 'Add Student'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </Layout>
    );
  };


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
